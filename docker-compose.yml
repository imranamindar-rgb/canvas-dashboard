services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend/google_credentials.json:/app/google_credentials.json:ro
      - ./backend/token.json:/app/token.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
